name: ⚡ Excel & Discord Quick Test (10s)

on:
  workflow_dispatch:

jobs:
  test-pipeline:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: pip install openpyxl requests

    - name: Create Mock Data for Testing
      run: |
        echo "target-site.com" > targets.txt
        mkdir -p results
        echo "https://target-site.com/api/v1/user" > results/mock_gau.txt
        echo "https://target-site.com/assets/main.js" > results/mock_waybackurls.txt

    - name: Test Excel Builder
      run: python txt_to_excel.py

    - name: Upload Final Excel Report to Private Discord
      env:
        DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      run: |
        python upload_to_discord.py
